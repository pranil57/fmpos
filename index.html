<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Mohalla POS PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-tab { border-bottom: 4px solid #facc15; font-weight: bold; color: #facc15; }
        .active-table { background: #facc15 !important; color: black; font-weight: bold; transform: scale(1.05); }
        .receipt-font { font-family: 'Courier New', Courier, monospace; }
        #admin-modal, #login-overlay { display: none; }
        /* Show login by default if not authenticated */
        .not-logged-in #login-overlay { display: flex; }
    </style>
</head>

<body class="bg-gray-900 text-white flex flex-col h-screen overflow-hidden not-logged-in">

<div id="login-overlay" class="fixed inset-0 bg-gray-950 z-[100] flex flex-col items-center justify-center p-6">
    <div class="bg-white text-black p-8 rounded-3xl shadow-2xl w-full max-w-md text-center">
        <div class="text-5xl mb-4">🍕</div>
        <h2 class="text-3xl font-black tracking-tighter mb-2">FOOD MOHALLA</h2>
        <p class="text-gray-500 mb-8 font-medium">Please login to access POS</p>
        
        <div class="space-y-4 text-left">
            <div>
                <label class="text-xs font-bold uppercase text-gray-400 ml-1">Username</label>
                <input id="login-user" type="text" class="w-full border-2 border-gray-100 p-3 rounded-xl focus:border-red-500 outline-none transition" placeholder="admin">
            </div>
            <div>
                <label class="text-xs font-bold uppercase text-gray-400 ml-1">Password</label>
                <input id="login-pass" type="password" class="w-full border-2 border-gray-100 p-3 rounded-xl focus:border-red-500 outline-none transition" placeholder="••••">
            </div>
            <button onclick="handleLogin()" class="w-full bg-red-600 hover:bg-red-700 text-white font-black py-4 rounded-xl shadow-lg shadow-red-200 transition-all active:scale-95">
                UNLOCK SYSTEM
            </button>
            <p id="login-error" class="text-red-500 text-center text-sm font-bold hidden">❌ Invalid Username or Password</p>
        </div>
    </div>
    <p class="mt-8 text-gray-600 text-sm">Authorized Personnel Only</p>
</div>

<div class="bg-red-700 p-4 flex justify-between items-center shadow-lg">
    <div class="flex items-center gap-2">
        <span class="text-3xl">🍕</span><h1 class="text-2xl font-black tracking-tighter">FOOD MOHALLA</h1>
    </div>
    <div class="flex gap-2">
        <button onclick="logout()" class="bg-black/20 hover:bg-black/30 px-4 py-2 rounded-lg font-bold transition">Logout</button>
        <button onclick="toggleAdmin()" class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg font-bold transition">⚙️ Admin & Reports</button>
    </div>
</div>

<div class="flex flex-1 overflow-hidden">
    <div id="tables" class="w-28 bg-gray-800 p-2 overflow-y-auto border-r border-gray-700 flex flex-col gap-2"></div>

    <div class="w-96 bg-white text-black flex flex-col shadow-2xl">
        <div class="p-4 bg-gray-100 font-bold border-b flex justify-between items-center">
            <span class="text-lg">Table: <span id="table-name" class="text-red-600">--</span></span>
            <button onclick="clearTable()" class="text-xs text-gray-400 hover:text-red-500 underline">Clear All</button>
        </div>
        <div id="cart" class="flex-1 p-4 overflow-y-auto space-y-3"></div>
        <div class="p-4 bg-gray-900 text-white">
            <div class="flex justify-between items-center mb-4">
                <span class="text-gray-400">Grand Total</span>
                <span class="text-3xl font-bold text-yellow-400">₹<span id="total">0</span></span>
            </div>
            <button onclick="kot()" class="w-full bg-purple-600 hover:bg-purple-700 py-3 rounded-lg font-bold mb-2 transition">Print KOT</button>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="bill('Cash')" class="bg-yellow-500 hover:bg-yellow-600 text-black py-3 rounded-lg font-bold transition">💵 Cash</button>
                <button onclick="bill('Online')" class="bg-blue-600 hover:bg-blue-700 py-3 rounded-lg font-bold transition">💳 Online</button>
            </div>
        </div>
    </div>

    <div class="flex-1 flex flex-col bg-gray-100 text-black">
        <div id="cats" class="flex gap-4 p-4 bg-white shadow-sm overflow-x-auto scrollbar-hide"></div>
        <div id="menu" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 p-6 overflow-y-auto"></div>
    </div>
</div>

<div id="admin-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
    <div class="bg-white text-black w-full max-w-4xl max-h-[90vh] rounded-2xl overflow-hidden flex flex-col">
        <div class="p-4 bg-gray-800 text-white flex justify-between items-center">
            <h2 class="text-xl font-bold">Admin Dashboard</h2>
            <button onclick="toggleAdmin()" class="text-2xl">&times;</button>
        </div>
        <div class="flex flex-1 overflow-hidden">
            <div class="w-48 bg-gray-100 border-r p-4 flex flex-col gap-2">
                <button onclick="showAdminSection('editor')" class="text-left p-2 rounded hover:bg-gray-200 font-bold">➕ Add/Edit Menu</button>
                <button onclick="showAdminSection('reports')" class="text-left p-2 rounded hover:bg-gray-200 font-bold">📊 Daily Report</button>
            </div>
            <div class="flex-1 p-6 overflow-y-auto">
                <div id="section-editor" class="admin-section">
                    <h3 class="text-lg font-bold mb-4">Add New Item</h3>
                    <div class="grid grid-cols-2 gap-4 mb-8 p-4 border rounded-xl">
                        <input id="new-name" placeholder="Item Name" class="border p-2 rounded">
                        <select id="new-cat" class="border p-2 rounded"></select>
                        <input id="new-price" type="number" placeholder="Price" class="border p-2 rounded">
                        <input id="new-img" placeholder="Image URL (Optional)" class="border p-2 rounded">
                        <button onclick="addItem()" class="col-span-2 bg-green-600 text-white py-2 rounded-lg font-bold">Save to Menu</button>
                    </div>
                    <div id="inventory-list" class="space-y-2"></div>
                </div>
                <div id="section-reports" class="admin-section hidden">
                    <div class="flex justify-between items-center mb-4"><h3 class="text-lg font-bold">Sales History</h3><button onclick="clearReports()" class="text-red-500 text-sm italic">Clear All History</button></div>
                    <div id="report-stats" class="grid grid-cols-3 gap-4 mb-6"></div>
                    <div id="report-list" class="space-y-2"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// --- AUTHENTICATION LOGIC ---
const AUTH_CONFIG = {
    user: "admin",
    pass: "1234" // CHANGE YOUR PASSWORD HERE
};

function handleLogin() {
    const u = document.getElementById("login-user").value;
    const p = document.getElementById("login-pass").value;
    const errorMsg = document.getElementById("login-error");

    if(u === AUTH_CONFIG.user && p === AUTH_CONFIG.pass) {
        sessionStorage.setItem("fm_authenticated", "true");
        document.body.classList.remove("not-logged-in");
        errorMsg.classList.add("hidden");
    } else {
        errorMsg.classList.remove("hidden");
    }
}

function checkAuth() {
    if(sessionStorage.getItem("fm_authenticated") === "true") {
        document.body.classList.remove("not-logged-in");
    }
}

function logout() {
    sessionStorage.removeItem("fm_authenticated");
    location.reload();
}

// --- YOUR ORIGINAL DATA & LOGIC ---
const TABLES = ["T1","T2","T3","T4","T5","T6","T7","T8","P-1","P-2"];
const CATEGORIES = ["Pizza","Burger","Burgizza","Sandwich","Fries","Garlic Bread","Bite Buddies","Pasta","Combo","Mocktails","Sip & Chill"];

let activeTable = "T1";
let activeCat = "Pizza";
let menu = JSON.parse(localStorage.getItem("fm_menu")) || [];
let tables = JSON.parse(localStorage.getItem("fm_tables")) || {};
let sales = JSON.parse(localStorage.getItem("fm_sales")) || [];

TABLES.forEach(t => { if(!tables[t]) tables[t] = [] });

function save() {
    localStorage.setItem("fm_menu", JSON.stringify(menu));
    localStorage.setItem("fm_tables", JSON.stringify(tables));
    localStorage.setItem("fm_sales", JSON.stringify(sales));
}

function renderTables(){
    document.getElementById("tables").innerHTML = TABLES.map(t=>`
        <button onclick="setTable('${t}')" class="w-full py-4 rounded-xl transition text-sm ${t===activeTable?'active-table':'bg-gray-700 text-gray-300 hover:bg-gray-600'}">
            ${t}
            ${tables[t].length > 0 ? '<div class="text-[10px] text-red-400 mt-1">● Occupied</div>' : ''}
        </button>`).join("");
    document.getElementById("table-name").innerText = activeTable;
}

function renderCats(){
    document.getElementById("cats").innerHTML = CATEGORIES.map(c=>`
        <button onclick="setCat('${c}')" class="pb-2 transition-all ${c===activeCat?'active-tab':'text-gray-400 hover:text-black'} font-bold whitespace-nowrap">
            ${c}
        </button>`).join("");
    document.getElementById("new-cat").innerHTML = CATEGORIES.map(c=>`<option value="${c}">${c}</option>`).join("");
}

function renderMenu(){
    let items = menu.filter(m=>m.category===activeCat);
    document.getElementById("menu").innerHTML = items.map(m=>`
        <div onclick="addCart(${m.id})" class="bg-white p-3 rounded-2xl shadow-sm hover:shadow-md cursor-pointer transition transform active:scale-95 border border-transparent hover:border-red-200">
            <div class="h-32 bg-gray-100 rounded-xl mb-3 overflow-hidden">
                <img src="${m.img || 'https://images.unsplash.com/photo-1513104890138-7c749659a591?w=200'}" class="w-full h-full object-cover">
            </div>
            <h3 class="font-bold text-gray-800 truncate">${m.name}</h3>
            <p class="text-red-600 font-black">₹${m.price}</p>
        </div>`).join("");
}

function renderCart(){
    let cart = tables[activeTable];
    let total = 0;
    document.getElementById("cart").innerHTML = cart.length === 0 ? 
        '<div class="h-full flex flex-col items-center justify-center text-gray-300"><span class="text-4xl">🛒</span><p>Cart is empty</p></div>' :
        cart.map(i=>{
            total += i.price*i.qty;
            return `
            <div class="flex items-center justify-between group">
                <div class="flex-1"><h4 class="font-bold text-sm">${i.name}</h4><span class="text-xs text-gray-500">₹${i.price} / unit</span></div>
                <div class="flex items-center gap-3">
                    <div class="flex items-center bg-gray-100 rounded-lg p-1">
                        <button onclick="dec(${i.id})" class="w-6 h-6 bg-white rounded shadow text-red-500">-</button>
                        <span class="w-8 text-center font-bold">${i.qty}</span>
                        <button onclick="inc(${i.id})" class="w-6 h-6 bg-white rounded shadow text-green-500">+</button>
                    </div>
                    <span class="w-16 text-right font-bold">₹${i.price*i.qty}</span>
                </div>
            </div>`;
        }).join("");
    document.getElementById("total").innerText = total;
}

function setTable(t){ activeTable=t; renderTables(); renderCart(); }
function setCat(c){ activeCat=c; renderCats(); renderMenu(); }

function addCart(id){
    let item = menu.find(m=>m.id==id);
    let cart = tables[activeTable];
    let exist = cart.find(i=>i.id==id);
    if(exist) exist.qty++;
    else cart.push({...item, qty:1});
    save(); renderCart(); renderTables();
}

function inc(id){ tables[activeTable].find(i=>i.id==id).qty++; save(); renderCart(); }
function dec(id){
    let cart = tables[activeTable];
    let i = cart.findIndex(x=>x.id==id);
    if(cart[i].qty>1) cart[i].qty--;
    else cart.splice(i,1);
    save(); renderCart(); renderTables();
}

function clearTable(){ if(confirm("Clear this table?")) { tables[activeTable] = []; save(); renderCart(); renderTables(); } }

function kot(){
    let cart = tables[activeTable];
    if(cart.length==0) return alert("Cart is empty");
    let w = window.open('','','width=400,height=600');
    w.document.write(`<html><body onload="window.print(); window.close();" style="font-family:monospace;width:80mm"><h3>KOT: ${activeTable}</h3><hr>${cart.map(i => `<div>${i.name} x${i.qty}</div>`).join("")}</body></html>`);
}

function bill(mode){
    let cart = tables[activeTable];
    if(cart.length==0) return alert("Cart is empty");
    let total = cart.reduce((sum, i) => sum + (i.price*i.qty), 0);
    sales.push({ id: Date.now(), date: new Date().toLocaleDateString(), time: new Date().toLocaleTimeString(), table: activeTable, items: [...cart], total: total, mode: mode });
    let w = window.open('','','width=400,height=800');
    w.document.write(`<html><body onload="window.print(); window.close();" style="font-family:monospace;width:80mm"><center><h2>FOOD MOHALLA</h2><p>${new Date().toLocaleString()}</p></center><hr>${cart.map(i => `<div style="display:flex;justify-content:space-between"><span>${i.name} x${i.qty}</span><span>₹${i.price*i.qty}</span></div>`).join("")}<hr><div style="display:flex;justify-content:space-between;font-weight:bold"><span>TOTAL:</span><span>₹${total}</span></div></body></html>`);
    tables[activeTable]=[]; save(); renderCart(); renderTables();
}

function toggleAdmin(){
    const modal = document.getElementById("admin-modal");
    modal.style.display = modal.style.display === "flex" ? "none" : "flex";
    if(modal.style.display === "flex") { showAdminSection('editor'); renderInventory(); }
}

function showAdminSection(id){
    document.querySelectorAll('.admin-section').forEach(s => s.classList.add('hidden'));
    document.getElementById('section-' + id).classList.remove('hidden');
    if(id === 'reports') renderReports();
}

function addItem(){
    let name = document.getElementById("new-name").value;
    let cat = document.getElementById("new-cat").value;
    let price = document.getElementById("new-price").value;
    let img = document.getElementById("new-img").value;
    if(!name || !price) return alert("Fill Name and Price");
    menu.push({ id: Date.now(), name, category: cat, price: parseFloat(price), img });
    save(); renderMenu(); renderInventory();
    document.getElementById("new-name").value = ""; document.getElementById("new-price").value = "";
}

function deleteMenu(id){ if(confirm("Remove this item?")){ menu = menu.filter(m => m.id !== id); save(); renderMenu(); renderInventory(); } }

function renderInventory(){
    document.getElementById("inventory-list").innerHTML = menu.map(m=>`
        <div class="flex justify-between items-center p-2 bg-gray-50 rounded border"><span><strong>${m.name}</strong> (${m.category}) - ₹${m.price}</span><button onclick="deleteMenu(${m.id})" class="text-red-500">Delete</button></div>`).join("");
}

function renderReports(){
    let totalSales = sales.reduce((a,b)=>a+b.total, 0);
    let cash = sales.filter(s=>s.mode==='Cash').reduce((a,b)=>a+b.total, 0);
    let online = sales.filter(s=>s.mode==='Online').reduce((a,b)=>a+b.total, 0);
    document.getElementById("report-stats").innerHTML = `<div class="p-4 bg-green-100 rounded-xl text-green-800"><p class="text-sm">Total Sales</p><h4 class="text-2xl font-bold">₹${totalSales}</h4></div><div class="p-4 bg-yellow-100 rounded-xl text-yellow-800"><p class="text-sm">Cash</p><h4 class="text-2xl font-bold">₹${cash}</h4></div><div class="p-4 bg-blue-100 rounded-xl text-blue-800"><p class="text-sm">Online</p><h4 class="text-2xl font-bold">₹${online}</h4></div>`;
    document.getElementById("report-list").innerHTML = sales.slice().reverse().map(s=>`<div class="p-3 border-b text-sm flex justify-between"><div><strong>${s.time}</strong> - ${s.table} (${s.mode})</div><div class="font-bold">₹${s.total}</div></div>`).join("");
}

function clearReports(){ if(confirm("This will delete all sales history. Continue?")){ sales = []; save(); renderReports(); } }

// INIT
checkAuth(); renderTables(); renderCats(); renderMenu(); renderCart();
</script>
</body>
</html>
