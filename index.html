<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Mohalla POS PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-tab { border-bottom: 4px solid #facc15; font-weight: bold; color: #facc15; }
        .active-table { background: #facc15 !important; color: black; font-weight: bold; transform: scale(1.05); }
        #admin-modal, #split-payment-modal, #main-app { display: none; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        @media print { .no-print { display: none; } }
    </style>
</head>

<body class="bg-gray-900 text-white flex flex-col h-screen overflow-hidden">

<!-- Login Overlay -->
<div id="login-overlay" class="fixed inset-0 bg-gray-950 z-[1000] flex flex-col items-center justify-center p-6">
    <div class="bg-white text-black p-8 rounded-3xl shadow-2xl w-full max-w-md text-center">
        <div class="text-6xl mb-4">🍕</div>
        <h2 class="text-3xl font-black tracking-tighter mb-6">FOOD MOHALLA</h2>
        <div class="space-y-4 text-left">
            <input id="login-user" type="text" class="w-full border-2 p-3 rounded-xl outline-none focus:border-red-500" placeholder="Username" autocomplete="off">
            <input id="login-pass" type="password" class="w-full border-2 p-3 rounded-xl outline-none focus:border-red-500" placeholder="Password" autocomplete="off">
            <button onclick="handleLogin()" class="w-full bg-red-600 hover:bg-red-700 text-white font-black py-4 rounded-xl shadow-lg transition-all active:scale-95">UNLOCK SYSTEM</button>
            <p id="login-error" class="text-red-500 text-center text-sm font-bold hidden mt-2">❌ Invalid Login</p>
        </div>
    </div>
</div>

<!-- Main Application -->
<div id="main-app" class="flex-col h-full">
    <div class="bg-red-700 p-3 flex justify-between items-center shadow-lg no-print">
        <div class="flex items-center gap-3">
            <span class="text-4xl">🍕</span>
            <h1 class="text-2xl font-black tracking-tighter italic uppercase text-white">Food Mohalla</h1>
        </div>
        <div class="flex gap-2">
            <button onclick="logout()" class="bg-black/20 hover:bg-black/30 px-4 py-2 rounded-lg font-bold transition text-xs">Logout</button>
            <button onclick="toggleAdmin()" class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg font-bold transition text-xs">⚙️ Admin</button>
        </div>
    </div>

    <div class="flex flex-1 overflow-hidden">
        <!-- Tables Sidebar -->
        <div id="tables" class="w-24 bg-gray-800 p-2 overflow-y-auto border-r border-gray-700 flex flex-col gap-2 no-print"></div>

        <!-- Cart Section -->
        <div class="w-96 bg-white text-black flex flex-col shadow-2xl no-print">
            <div class="p-4 bg-gray-100 font-bold border-b flex justify-between items-center">
                <span class="text-lg">Table: <span id="table-name" class="text-red-600">--</span></span>
                <button onclick="clearTable()" class="text-xs text-gray-400 hover:text-red-500 underline">Clear</button>
            </div>
            <div id="cart" class="flex-1 p-4 overflow-y-auto space-y-3"></div>

            <div class="p-4 bg-gray-900 text-white">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-gray-400">Total</span>
                    <span class="text-3xl font-bold text-yellow-400">₹<span id="total">0</span></span>
                </div>
                <button onclick="printReceipt('KOT')" class="w-full bg-indigo-600 hover:bg-indigo-700 py-3 rounded-lg font-bold mb-2 shadow-md">📋 PRINT KOT</button>
                <div class="grid grid-cols-2 gap-2 mb-2">
                    <button onclick="processQuickBill('Cash')" class="bg-emerald-600 hover:bg-emerald-700 text-white py-3 rounded-lg font-bold shadow-md">💰 CASH</button>
                    <button onclick="processQuickBill('Online')" class="bg-sky-600 hover:bg-sky-700 text-white py-3 rounded-lg font-bold shadow-md">💳 ONLINE</button>
                </div>
                <button onclick="openSplitModal()" class="w-full border border-orange-500 text-orange-500 hover:bg-orange-500 hover:text-white py-2 rounded-lg font-bold transition text-xs uppercase">Split (Cash + Online)</button>
            </div>
        </div>

        <!-- Menu Section -->
        <div class="flex-1 flex flex-col bg-gray-100 text-black no-print">
            <div class="bg-white shadow-sm p-4 border-b">
                <div id="cats" class="flex gap-4 overflow-x-auto scrollbar-hide whitespace-nowrap px-2 mb-3"></div>
                <div class="relative w-full">
                    <span class="absolute left-3 top-2 text-gray-400">🔍</span>
                    <input id="menu-search" type="text" oninput="renderMenu()" placeholder="Search items..." class="w-full pl-9 pr-4 py-2 border-2 border-gray-100 rounded-xl focus:border-red-500 outline-none text-sm">
                </div>
            </div>
            <div id="menu" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 p-6 overflow-y-auto"></div>
        </div>
    </div>
</div>

<!-- Split Payment Modal -->
<div id="split-payment-modal" class="fixed inset-0 bg-black/90 flex items-center justify-center z-[2000] p-4 text-black">
    <div class="bg-white p-6 rounded-2xl w-full max-w-sm">
        <h3 class="text-xl font-bold mb-4 border-b pb-2">Split Bill</h3>
        <div class="mb-4 rounded-lg bg-orange-50 border border-orange-200 px-4 py-3 font-bold text-orange-700">
            Total: ₹<span id="split-total-display">0</span>
        </div>
        <input id="split-cash" type="number" oninput="calculateSplit()" class="w-full border-2 p-3 rounded-lg font-bold mb-3" placeholder="Cash Amount">
        <input id="split-online" type="number" readonly class="w-full border-2 bg-blue-50 p-3 rounded-lg font-bold text-blue-600 mb-4" placeholder="Online Amount">
        <div class="flex gap-2">
            <button onclick="closeSplitModal()" class="flex-1 bg-gray-200 py-3 rounded-lg font-bold">Cancel</button>
            <button onclick="submitSplitPayment()" class="flex-1 bg-green-600 text-white py-3 rounded-lg font-bold">Pay & Print</button>
        </div>
    </div>
</div>

<!-- Admin Modal -->
<div id="admin-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-[2000] p-4 text-black">
    <div class="bg-white w-full max-w-4xl max-h-[90vh] rounded-2xl overflow-hidden flex flex-col">
        <div class="p-4 bg-gray-800 text-white flex justify-between items-center">
            <h2 class="text-xl font-bold">MANAGEMENT</h2>
            <button onclick="toggleAdmin()" class="text-2xl">&times;</button>
        </div>
        <div class="flex flex-1 overflow-hidden">
            <div class="w-48 bg-gray-100 border-r p-4 flex flex-col gap-2">
                <button onclick="verifyOwnerAndShow('editor')" class="text-left p-3 rounded hover:bg-gray-200 font-bold">MENU EDITOR</button>
                <button onclick="showAdminSection('reports')" class="text-left p-3 rounded hover:bg-gray-200 font-bold">REPORTS</button>
            </div>
            <div class="flex-1 p-6 overflow-y-auto">
                <div id="section-editor" class="admin-section hidden">
                    <div class="grid grid-cols-2 gap-4 mb-8 p-4 border rounded-xl bg-gray-50">
                        <input id="new-name" placeholder="Item Name" class="border p-2 rounded">
                        <select id="new-cat" class="border p-2 rounded"></select>
                        <input id="new-price" type="number" placeholder="Price" class="border p-2 rounded">
                        <input id="new-img" placeholder="Image Link" class="border p-2 rounded">
                        <button onclick="addItem()" class="col-span-2 bg-green-600 text-white py-2 rounded-lg font-bold">SAVE ITEM</button>
                    </div>
                    <div id="inventory-list" class="space-y-1"></div>
                </div>
                <div id="section-reports" class="admin-section hidden">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="font-bold">Sales</h3>
                        <button onclick="closeRegister()" class="bg-red-600 text-white px-3 py-1 rounded text-xs font-bold">🔒 CLOSE REGISTER (CSV)</button>
                    </div>
                    <div id="report-stats" class="grid grid-cols-3 gap-4 mb-6"></div>
                    <div id="report-list" class="space-y-1"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<iframe id="print-frame" style="display:none;"></iframe>

<script>
// --- Configuration & Initialization ---
const AUTH_CONFIG = { user: "admin", pass: "admin123", ownerPass: "owner789" };
const TABLES = ["T1", "T2", "T3", "T4", "T5", "T6", "T7", "T8", "P-1", "P-2"];
const CATEGORIES = ["PIZZA", "PIZZA SIDES", "BURGER", "PASTA", "BURGIZZA", "SANDWICH", "FRY-O-CLOCK", "BITE BUDDIES", "MOCKTAILS", "SIP & CHILL", "SIZZLING & SWEET"];

const defaultMenu = [
    { id: 1, name: "Single Cheese (R)", category: "PIZZA", price: 119, img: "https://images.unsplash.com/photo-1593560704563-f176a2eb61db?q=80&w=200&auto=format&fit=crop" },
    { id: 4, name: "Double Cheese (R)", category: "PIZZA", price: 149, img: "https://images.unsplash.com/photo-1594179047519-f347310d3322?q=80&w=200&auto=format&fit=crop" },
    { id: 13, name: "Regular Garlic Bread", category: "PIZZA SIDES", price: 69, img: "https://images.unsplash.com/photo-1619531659550-881af319de01?q=80&w=200&auto=format&fit=crop" },
    { id: 16, name: "Aloo Tikki Burger", category: "BURGER", price: 69, img: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?q=80&w=200&auto=format&fit=crop" },
    { id: 23, name: "Classic Fries", category: "FRY-O-CLOCK", price: 69, img: "https://images.unsplash.com/photo-1573080493109-dbdd990dbf8b?q=80&w=200&auto=format&fit=crop" },
    { id: 25, name: "Mint Mojito", category: "MOCKTAILS", price: 119, img: "https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?q=80&w=200&auto=format&fit=crop" }
];

let activeTable = TABLES[0];
let activeCat = CATEGORIES[0];
let menu = JSON.parse(localStorage.getItem("fm_menu")) || defaultMenu;
let tables = JSON.parse(localStorage.getItem("fm_tables")) || {};
let sales = JSON.parse(localStorage.getItem("fm_sales")) || [];

// Ensure all tables exist in the object
TABLES.forEach(t => { if (!tables[t]) tables[t] = []; });

// --- Auth Functions ---
function handleLogin() {
    const u = document.getElementById("login-user").value.trim();
    const p = document.getElementById("login-pass").value.trim();
    if (u === AUTH_CONFIG.user && p === AUTH_CONFIG.pass) {
        unlockApp();
    } else {
        document.getElementById("login-error").classList.remove("hidden");
    }
}

function unlockApp() {
    sessionStorage.setItem("fm_auth", "true");
    document.getElementById("login-overlay").style.display = "none";
    document.getElementById("main-app").style.display = "flex";
    initSystem();
}

function logout() {
    sessionStorage.removeItem("fm_auth");
    location.reload();
}

function initSystem() {
    renderTables();
    renderCats();
    renderMenu();
    renderCart();
}

// --- Cart & Table Functions ---
function setTable(t) {
    activeTable = t;
    renderTables();
    renderCart();
}

function renderTables() {
    document.getElementById("tables").innerHTML = TABLES.map(t => `
        <button onclick="setTable('${t}')" class="w-full py-4 rounded-xl transition text-sm ${t === activeTable ? 'active-table' : 'bg-gray-700 text-gray-300'}">
            ${t}${tables[t].length > 0 ? ' ●' : ''}
        </button>
    `).join("");
    document.getElementById("table-name").innerText = activeTable;
}

function renderCart() {
    let total = 0;
    const cart = tables[activeTable];
    const container = document.getElementById("cart");
    
    if (cart.length === 0) {
        container.innerHTML = '<div class="text-center mt-20 text-gray-300 italic">No Items</div>';
    } else {
        container.innerHTML = cart.map(item => {
            total += item.price * item.qty;
            return `
            <div class="flex justify-between items-center border-b pb-2">
                <div class="flex-1 font-bold text-sm">${item.name}</div>
                <div class="flex items-center gap-3">
                    <div class="flex items-center bg-gray-100 rounded-lg">
                        <button onclick="dec(${item.id})" class="w-7 h-7 flex items-center justify-center text-red-500 font-bold">-</button>
                        <span class="w-6 text-center text-xs font-bold">${item.qty}</span>
                        <button onclick="inc(${item.id})" class="w-7 h-7 flex items-center justify-center text-green-500 font-bold">+</button>
                    </div>
                    <span class="w-16 text-right font-black">₹${item.price * item.qty}</span>
                </div>
            </div>`;
        }).join("");
    }
    document.getElementById("total").innerText = total;
}

function addCart(id) {
    const item = menu.find(m => m.id === id);
    if (!item) return;
    const existing = tables[activeTable].find(i => i.id === id);
    if (existing) existing.qty++;
    else tables[activeTable].push({ ...item, qty: 1 });
    save();
    renderCart();
    renderTables();
}

function inc(id) {
    const item = tables[activeTable].find(i => i.id === id);
    if (item) item.qty++;
    save();
    renderCart();
}

function dec(id) {
    const idx = tables[activeTable].findIndex(i => i.id === id);
    if (idx === -1) return;
    if (tables[activeTable][idx].qty > 1) tables[activeTable][idx].qty--;
    else tables[activeTable].splice(idx, 1);
    save();
    renderCart();
    renderTables();
}

function clearTable() {
    if (confirm("Clear this table?")) {
        tables[activeTable] = [];
        save();
        renderCart();
        renderTables();
    }
}

// --- Menu Functions ---
function setCat(c) {
    activeCat = c;
    renderCats();
    renderMenu();
}

function renderCats() {
    document.getElementById("cats").innerHTML = CATEGORIES.map(c => `
        <button onclick="setCat('${c}')" class="pb-2 transition-all ${c === activeCat ? 'active-tab' : 'text-gray-400'} font-bold uppercase text-xs">
            ${c}
        </button>
    `).join("");
    document.getElementById("new-cat").innerHTML = CATEGORIES.map(c => `<option value="${c}">${c}</option>`).join("");
}

function renderMenu() {
    const q = document.getElementById("menu-search").value.toLowerCase();
    let filtered = menu.filter(m => m.category === activeCat);
    if (q) filtered = filtered.filter(m => m.name.toLowerCase().includes(q));
    
    document.getElementById("menu").innerHTML = filtered.length === 0
        ? '<div class="col-span-full text-center text-gray-500 italic py-10">No items found.</div>'
        : filtered.map(m => `
            <div onclick="addCart(${m.id})" class="bg-white p-3 rounded-2xl shadow-sm border active:scale-95 transition cursor-pointer">
                <div class="h-24 bg-gray-100 rounded-xl mb-2 overflow-hidden">
                    <img src="${m.img}" class="w-full h-full object-cover">
                </div>
                <h3 class="font-bold text-xs truncate">${m.name}</h3>
                <p class="text-red-600 font-black text-sm">₹${m.price}</p>
            </div>
        `).join("");
}

// --- Payment & Sales ---
function processQuickBill(mode) {
    const total = parseInt(document.getElementById("total").innerText);
    if (total <= 0) return alert("Cart empty");
    processFinalSale({ total, cash: mode === 'Cash' ? total : 0, online: mode === 'Online' ? total : 0, mode });
}

function processFinalSale(data) {
    const sale = {
        id: Date.now(),
        date: new Date().toLocaleDateString(),
        time: new Date().toLocaleTimeString(),
        table: activeTable,
        items: [...tables[activeTable]],
        ...data
    };
    printReceipt('BILL', sale);
    sales.push(sale);
    tables[activeTable] = [];
    save();
    renderCart();
    renderTables();
}

function calculateSplit() {
    const total = parseInt(document.getElementById("total").innerText);
    let cash = parseInt(document.getElementById("split-cash").value) || 0;
    if (cash > total) { cash = total; document.getElementById("split-cash").value = total; }
    document.getElementById("split-online").value = total - cash;
}

function submitSplitPayment() {
    const total = parseInt(document.getElementById("total").innerText);
    const cash = parseInt(document.getElementById("split-cash").value) || 0;
    const online = parseInt(document.getElementById("split-online").value) || 0;
    if (cash + online !== total) return alert("Mismatch");
    processFinalSale({ total, cash, online, mode: 'Split' });
    closeSplitModal();
}

// --- Printing ---
function printReceipt(type, saleData = null) {
    const cart = saleData ? saleData.items : tables[activeTable];
    const total = saleData ? saleData.total : cart.reduce((s, i) => s + (i.price * i.qty), 0);
    const html = `
    <div style="font-family:monospace; width:80mm; padding:10px;">
        <center>
            <div style="font-size:20px;">🍕 <b>FOOD MOHALLA</b></div>
            <div>${type === 'KOT' ? 'KITCHEN ORDER' : 'TAX INVOICE'}</div>
            <hr>
            <div>Table: ${activeTable} | ${new Date().toLocaleTimeString()}</div>
        </center>
        <hr>
        ${cart.map(i => `<div style="display:flex; justify-content:between;"><span>${i.name} x${i.qty}</span> <span>₹${i.price * i.qty}</span></div>`).join("")}
        <hr>
        ${type !== 'KOT' ? `<div style="font-size:18px; font-weight:bold; text-align:right;">TOTAL: ₹${total}</div><div style="text-align:right;">Mode: ${saleData.mode}</div>` : ""}
    </div>`;
    
    const frame = document.getElementById("print-frame");
    frame.contentWindow.document.open();
    frame.contentWindow.document.write(html);
    frame.contentWindow.document.close();
    frame.contentWindow.print();
}

// --- Admin Functions ---
function toggleAdmin() {
    const m = document.getElementById("admin-modal");
    m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
}

function showAdminSection(id) {
    document.querySelectorAll(".admin-section").forEach(s => s.classList.add("hidden"));
    document.getElementById(`section-${id}`).classList.remove("hidden");
    if (id === 'reports') renderReports();
}

function verifyOwnerAndShow(section) {
    if (prompt("Owner Password:") === AUTH_CONFIG.ownerPass) {
        showAdminSection(section);
        renderInventory();
    }
}

function addItem() {
    const name = document.getElementById("new-name").value;
    const price = parseInt(document.getElementById("new-price").value);
    const cat = document.getElementById("new-cat").value;
    const img = document.getElementById("new-img").value || "https://images.unsplash.com/photo-1513104890138-7c749659a591?q=80&w=200&auto=format&fit=crop";
    
    if (!name || isNaN(price)) return alert("Valid data please");
    menu.push({ id: Date.now(), name, category: cat, price, img });
    save();
    renderMenu();
    renderInventory();
}

function deleteMenu(id) {
    if (confirm("Delete?")) {
        menu = menu.filter(m => m.id !== id);
        save();
        renderInventory();
        renderMenu();
    }
}

function renderInventory() {
    document.getElementById("inventory-list").innerHTML = menu.map(m => `
        <div class="flex justify-between p-2 border rounded bg-white text-xs mb-1">
            <span><b>${m.name}</b> (${m.category}) - ₹${m.price}</span>
            <button onclick="deleteMenu(${m.id})" class="text-red-500 font-bold">Delete</button>
        </div>
    `).join("");
}

function renderReports() {
    const cash = sales.reduce((a, b) => a + b.cash, 0);
    const online = sales.reduce((a, b) => a + b.online, 0);
    document.getElementById("report-stats").innerHTML = `
        <div class="p-4 bg-green-50 border font-bold">Total: ₹${cash + online}</div>
        <div class="p-4 bg-yellow-50 border font-bold">Cash: ₹${cash}</div>
        <div class="p-4 bg-blue-50 border font-bold">Online: ₹${online}</div>
    `;
    document.getElementById("report-list").innerHTML = sales.slice().reverse().map(s => `
        <div class="text-[10px] p-2 border-b flex justify-between bg-white">
            <span>${s.date} ${s.time} | ${s.table}</span>
            <span class="font-bold">₹${s.total} (${s.mode})</span>
        </div>
    `).join("");
}

function closeRegister() {
    if (sales.length === 0) return alert("No sales");
    if (confirm("Close register? This clears report history.")) {
        let csv = "Date,Time,Table,Total,Mode\n";
        sales.forEach(s => csv += `${s.date},${s.time},${s.table},${s.total},${s.mode}\n`);
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `Report_${new Date().toLocaleDateString()}.csv`;
        a.click();
        sales = [];
        save();
        renderReports();
    }
}

function save() {
    localStorage.setItem("fm_menu", JSON.stringify(menu));
    localStorage.setItem("fm_tables", JSON.stringify(tables));
    localStorage.setItem("fm_sales", JSON.stringify(sales));
}

function openSplitModal() {
    const total = parseInt(document.getElementById("total").innerText);
    if (total <= 0) return;
    document.getElementById("split-total-display").innerText = total;
    document.getElementById("split-online").value = total;
    document.getElementById("split-payment-modal").style.display = 'flex';
}

function closeSplitModal() {
    document.getElementById("split-payment-modal").style.display = 'none';
}

// Check session
if (sessionStorage.getItem("fm_auth") === "true") unlockApp();
</script>
</body>
</html>
